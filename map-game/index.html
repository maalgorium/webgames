<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapgame</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page">

      <!-- ── Input Panel ──────────────────────────────────────────────────── -->
      <section class="input-panel">
        <div class="input-header">
          <div class="title-block">
            <h1>Map Game</h1>
            <p>Type a country name to claim it on the map.</p>
          </div>
          <div class="stats">
            <div class="timer" id="timer">00:00</div>
            <div class="progress" id="progress">0 / 0</div>
            <button class="pause" id="pause" type="button">Pause</button>
            <button class="reset" id="reset" type="button">Reset</button>
          </div>
        </div>

        <label for="guess">Country name</label>
        <input id="guess" type="text" autocomplete="off" placeholder="Start typing a country..." />
        <div class="hint">Examples: Japan, Cote d'Ivoire, United States</div>
        <div class="status" id="status"></div>
        <div class="star-container" id="star-container"></div>

        <div class="zoom-buttons">
          <button type="button" data-zoom="world">World</button>
          <button type="button" data-zoom="North America">N. America</button>
          <button type="button" data-zoom="South America">S. America</button>
          <button type="button" data-zoom="Europe">Europe</button>
          <button type="button" data-zoom="Africa">Africa</button>
          <button type="button" data-zoom="Asia">Asia</button>
          <button type="button" data-zoom="Oceania">Oceania</button>
        </div>
      </section>

      <!-- ── Map Panel ────────────────────────────────────────────────────── -->
      <section class="map-panel">
        <div class="map-frame" id="map-container">
          <div class="map-placeholder" id="map-placeholder">Loading map...</div>
        </div>
      </section>

      <!-- ── Continent Lists ───────────────────────────────────────────────── -->
      <section class="lists" id="lists"></section>

      <!-- ── Leaderboard ───────────────────────────────────────────────────── -->
      <section class="leaderboard-panel">
        <h2>Leaderboard</h2>
        <table class="leaderboard-table" id="leaderboard-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Countries</th>
              <th>Time</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
        <p class="leaderboard-empty" id="leaderboard-empty">
          No scores yet. Complete the game to add your score!
        </p>
      </section>

    </div>

    <!-- ── Win Modal ────────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <h2 id="modal-title">You found all countries!</h2>
        <p id="modal-time"></p>
        <label for="player-name">Enter your name for the leaderboard:</label>
        <input type="text" id="player-name" maxlength="30" placeholder="Your name..." />
        <div class="modal-actions">
          <button type="button" class="modal-save" id="modal-save">Save Score</button>
          <button type="button" class="modal-skip" id="modal-skip">Skip</button>
        </div>
      </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
